title: wireweave
slug: home
hero:
  stamp: "npm i wireweave"
  headline: "nostr. webrtc. zero backend."
  lede: "wireweave is the networking layer pulled out of zellous. p2p voice, chat, channels, servers, ban/role/settings — every byte moves through public nostr relays. import, wire, ship."
  cta:
    - label: "view on npm"
      href: "https://www.npmjs.com/package/wireweave"
      kind: green
    - label: "github"
      href: "https://github.com/AnEntrypoint/wireweave"
      kind: ghost
sections:
  - id: install
    label: "01 / install"
    title: "one package. thirteen modules."
    body: |
      wireweave ships as a single esm package. every subsystem is its own
      export so you tree-shake whatever you do not use.
    code: |
      npm i wireweave nostr-tools
      # then in browser
      import { createWireweave } from 'wireweave';
      const ww = createWireweave({ nostrTools, xstate, storage, relays });
  - id: api
    label: "02 / api"
    title: "everything EventTarget, everything real."
    body: |
      no fake relays. no stubs. wireweave talks to live public nostr relays
      and live webrtc peers from the first line. the api is EventTarget all
      the way down so you can subscribe to any surface without owning the loop.
    code: |
      const voice = ww.ensureVoice();
      voice.addEventListener('peer-joined', e => console.log(e.detail));
      await voice.connect('general');
  - id: docs
    label: "03 / modules"
    title: "13 pieces, each its own file."
    body: |
      relay-pool, auth, fsm, voice, chat, channels, servers, message, bans,
      roles, settings, media, pages. open src/ — no sprawl, no monolith.
modules:
  - slug: voice
    code: "01"
    meta: "rtc + sfu"
    blurb: "perfect negotiation, ice restart, track-stall detection, hub election."
  - slug: chat
    code: "02"
    meta: "nip-28"
    blurb: "public channels, replies, reactions. kinds 42 + 7."
  - slug: servers
    code: "03"
    meta: "nip-72"
    blurb: "community events, invite links, owner rename, delete."
  - slug: channels
    code: "04"
    meta: "30078"
    blurb: "parameterized replaceable channel list per server."
  - slug: roles
    code: "05"
    meta: "owner / admin / mod"
